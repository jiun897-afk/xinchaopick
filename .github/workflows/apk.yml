name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps & add Android platform
        working-directory: android-app
        run: |
          npm install
          npx cap add android
          npx capacitor-assets generate --android --assetPath assets || npx @capacitor/assets generate --android --assetPath assets || true
          npx cap sync android

      - name: Build debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android-app/android/app/build/outputs/apk/debug/app-debug.apk vejaview.apk

      - uses: actions/upload-artifact@v4
        with:
          name: vejaview-apk
          path: vejaview.apk
          retention-days: 14
