name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps & add Android platform
        working-directory: android-app
        run: |
          npm install
          npx cap add android
          npx capacitor-assets generate --android --assetPath assets || npx @capacitor/assets generate --android --assetPath assets || true
          # FCM 설정 + 베자뷰 알림음
          cp google-services.json android/app/google-services.json
          mkdir -p android/app/src/main/res/raw
          cp ../public/notify.mp3 android/app/src/main/res/raw/vejaview.mp3
          npx cap sync android

      - name: Build debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android-app/android/app/build/outputs/apk/debug/app-debug.apk vejaview.apk

      - uses: actions/upload-artifact@v4
        with:
          name: vejaview-apk
          path: vejaview.apk
          retention-days: 14

      - name: Push APK to apk-release branch
        run: |
          mkdir /tmp/apkout && cp vejaview.apk /tmp/apkout/
          cd /tmp/apkout
          git init -b apk-release
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add vejaview.apk
          git commit -m "APK build ${{ github.run_number }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" apk-release
